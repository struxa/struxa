services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: studio
      MYSQL_USER: studio
      MYSQL_PASSWORD: studio
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed_admin.sql:/docker-entrypoint-initdb.d/02-seed_admin.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  app:
    build: .
    ports:
      - "3439:80"
    volumes:
      - ./public/uploads:/var/www/html/public/uploads
      # Mount core app paths from the host so admin/templates/routes changes apply without rebuild.
      - ./templates:/var/www/html/templates
      - ./routes:/var/www/html/routes
      - ./bootstrap:/var/www/html/bootstrap
      - ./src:/var/www/html/src
      - ./bin:/var/www/html/bin
      - ./database/migrations:/var/www/html/database/migrations
      - ./public/js:/var/www/html/public/js
      - ./public/css:/var/www/html/public/css
      # Mount themes from the host so CSS/JS changes apply without rebuilding the image
      # (otherwise /theme-assets/* may 404 or serve stale files from the last docker build).
      - ./themes:/var/www/html/themes
      # Mount plugins from the host so new/updated plugins appear without rebuilding the image.
      - ./plugins:/var/www/html/plugins
    env_file:
      - path: .env
        required: false
    environment:
      # Reach MySQL by Docker service name (overrides DB_HOST in .env if set)
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: studio
      DB_USER: studio
      DB_PASS: studio
      PHPAUTH_SITE_URL: http://localhost:3439
      # Local dev: publish comments immediately (production should omit or set 0 and use Admin → Comments)
      CMS_COMMENTS_AUTO_APPROVE: "1"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
