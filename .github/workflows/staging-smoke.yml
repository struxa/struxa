name: Staging smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  smoke:
    runs-on: ubuntu-latest
    if: ${{ secrets.STRUXA_SMOKE_BASE_URL != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-dev

      - name: Run staging smoke
        env:
          STRUXA_SMOKE_BASE_URL: ${{ secrets.STRUXA_SMOKE_BASE_URL }}
        run: composer smoke:staging
